; Telnyx PJSIP Trunk - Credential-based authentication
; Env vars are substituted by entrypoint.sh at container start

[telnyx-out]
type = wizard
transport = transport-udp

sends_registrations = yes
remote_hosts = TELNYX_SIP_DOMAIN_PLACEHOLDER:5060

sends_auth = yes
outbound_auth/username = TELNYX_SIP_USER_PLACEHOLDER
outbound_auth/password = TELNYX_SIP_PASS_PLACEHOLDER

accepts_registrations = no
accepts_auth = no

endpoint/disallow = all
endpoint/allow = ulaw
endpoint/dtmf_mode = rfc4733
endpoint/context = from-telnyx
endpoint/rtp_symmetric = yes
endpoint/force_rport = yes
endpoint/rewrite_contact = yes
endpoint/direct_media = no
endpoint/from_user = TELNYX_OUTBOUND_CID_PLACEHOLDER
endpoint/from_domain = TELNYX_SIP_DOMAIN_PLACEHOLDER
endpoint/callerid = TELNYX_OUTBOUND_NAME_PLACEHOLDER <TELNYX_OUTBOUND_CID_PLACEHOLDER>
; Modem passthrough: disable all audio processing that corrupts modem
; training sequences. The d-modem reference implementation explicitly
; disabled VAD (no_vad=true) and echo cancellation (ec_tail_len=0).
; Without these, Asterisk may suppress silence frames (which carry
; meaningful modem training data) or introduce echo artifacts.
endpoint/rtp_timeout = 0
endpoint/rtp_timeout_hold = 0
aor/qualify_frequency = 60
